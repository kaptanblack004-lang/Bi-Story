<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Mineeee 🫶 En sevdiğim insana sürpriz varrrr</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4, #ff9a9e);
      background-size: 600% 600%;
      animation: gökkuşağıManyağı 12s ease infinite;
      font-family: "Comic Sans MS", "Chalkboard SE", cursive;
      color: #fff;
      overflow: hidden;
      cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48"><text y="36" font-size="42">😈</text></svg>'), auto;
    }

    @keyframes gökkuşağıManyağı {
      0% {background-position:0% 50%}
      50% {background-position:100% 50%}
      100% {background-position:0% 50%}
    }

    h1 {
      font-size: 11vw;
      text-align: center;
      margin-top: 12vh;
      text-shadow: 6px 6px 0 #000, -6px -6px 0 #ff00aa;
      animation: zıplaVeDön 2.4s infinite;
      user-select: none;
    }

    @keyframes zıplaVeDön {
      0%,100% { transform: translateY(0) rotate(-4deg) scale(1); }
      50%     { transform: translateY(-40px) rotate(4deg) scale(1.12); }
    }

    .mesaj {
      position: absolute;
      font-size: 7vw;
      font-weight: bold;
      color: #ffff00;
      text-shadow: 0 0 20px #ff00ff, 0 0 40px #000;
      pointer-events: none;
      animation: kaybolGel 5s infinite;
      white-space: nowrap;
    }

    @keyframes kaybolGel {
      0%,100% {opacity:0; transform:scale(0.3) translateY(100vh);}
      20%,80% {opacity:1; transform:scale(1.3) translateY(0);}
    }

    .buton {
      position: fixed;
      left: 50%;
      top: 70%;
      transform: translate(-50%, -50%);
      padding: 35px 90px;
      font-size: 8vw;
      font-weight: 900;
      color: #fff;
      background: #ff0066;
      border: 12px solid #00ffff;
      border-radius: 999px;
      box-shadow: 0 0 60px #ff00ff, inset 0 0 30px #000;
      cursor: not-allowed;
      user-select: none;
      pointer-events: none;
      animation: titretKudur 0.18s infinite alternate;
    }

    @keyframes titretKudur {
      0%   { transform: translate(-50%, -50%) rotate(-3deg) scale(1); }
      100% { transform: translate(-48%, -52%) rotate(3deg) scale(1.07); }
    }

    .yasak-yazi {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14vw;
      font-weight: 900;
      color: #ff0044;
      text-shadow: 0 0 35px black;
      transform: rotate(-12deg);
      pointer-events: none;
      z-index: 999;
      animation: yasaaaaak 9s infinite;
    }

    @keyframes yasaaaaak {
      0%   { transform: rotate(-12deg) scale(1); }
      50%  { transform: rotate(12deg) scale(1.2); }
      100% { transform: rotate(-12deg) scale(1); }
    }
  </style>
</head>
<body>

  <div class="yasak-yazi">TIKLAMA MİNE TIKLAMA LAN 🤬</div>

  <h1>MİNE MİNE MİNE MİNE MİNEEEE</h1>

  <div class="buton" id="fakeButon">BURAYA BAS BAKALIM 😏</div>

  <script>
    const sacmaMesajlar = [
      "Mine sen yine mi bastın ya 😂😂",
      "Aaa Mine sinirleniyo galiba hihihi",
      "Mineee dur öptüm ama basmaya devam ediyosun",
      "50 kere daha basarsan belki söylerim sırrı 🤫",
      "Mine bu kadar tıklama enerjini spora harcasana ya",
      "Hala basıyo lan bu kız 😂 pes etmiyo",
      "Mineeee yeter artık sinir oldum ben şimdi",
      "Tamam basmaya devam et bakalım ne olacak",
      "Mine senin yüzünden sayfa çökücek şimdi",
      "Hala burda mısın ya git işine bak 😤",
      "Mine en sinir bozucu arkadaş ödülü sana gidiyor 🏆",
      "Bas bas bas bas bas bas bas bas bas bas",
      "Mineee yeter ulan sinir krizi geçiricem"
    ];

    let tikSayisi = 0;

    document.body.addEventListener('click', (e) => {
      tikSayisi++;

      // Her tıklamada rastgele yerde saçma mesaj çıkar
      const msg = document.createElement('div');
      msg.className = 'mesaj';
      msg.textContent = sacmaMesajlar[Math.floor(Math.random() * sacmaMesajlar.length)];
      msg.style.left = Math.random() * 90 + 'vw';
      msg.style.top = Math.random() * 70 + 'vh';
      msg.style.animationDelay = Math.random() * 2 + 's';
      document.body.appendChild(msg);

      setTimeout(() => msg.remove(), 6000);

      // 8. tıklamadan sonra başlık değişmeye başlar
      if (tikSayisi > 7) {
        document.querySelector('h1').innerHTML = "MİNE DUR ARTIK YA" + " 😡".repeat(Math.min(tikSayisi-7, 8));
      }

      // 20 tık sonra buton küçülmeye başlar (psikolojik savaş)
      if (tikSayisi > 20) {
        const btn = document.getElementById('fakeButon');
        btn.style.transform = `translate(-50%, -50%) scale(${Math.max(0.3, 1 - (tikSayisi-20)*0.04)})`;
      }

      // 35 tık sonra ekran sallanır
      if (tikSayisi === 35) {
        document.body.style.animation = 'salla 0.4s infinite';
        document.body.insertAdjacentHTML('beforeend', `<style>@keyframes salla { 0%,100%{transform:translate(0,0)} 25%{transform:translate(-12px,8px)} 50%{transform:translate(12px,-8px)} 75%{transform:translate(-8px,12px)} }</style>`);
      }
    });
  </script>

</body>
</html>
